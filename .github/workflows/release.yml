name: Release APK

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true
        default: 'v0.0.0'
      notes:
        description: 'Release notes (markdown)'
        required: false
        default: 'Manual release.'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon

      - name: Build release APK
        run: gradle assembleRelease --no-daemon
        continue-on-error: true

      - name: Stage APKs for release
        run: |
          mkdir -p release-apks
          cp app/build/outputs/apk/debug/app-debug.apk release-apks/android-launcher-${{ github.event.inputs.tag }}-debug.apk
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            cp app/build/outputs/apk/release/app-release.apk release-apks/android-launcher-${{ github.event.inputs.tag }}-release.apk
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: ${{ github.event.inputs.tag }}
          body: ${{ github.event.inputs.notes }}
          files: release-apks/*
          draft: false
          prerelease: false
